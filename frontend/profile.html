<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile – Smart Expense</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">💰</div>
      <div>
        <div class="logo-text">SmartExpense</div>
        <div class="logo-sub">Budget Tracker</div>
      </div>
    </div>
    <nav>
      <div class="nav-label">Main Menu</div>
      <a class="nav-link" data-page="dashboard"   href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="nav-link" data-page="add-expense" href="add-expense.html"><span class="nav-icon">➕</span> Add Expense</a>
      <a class="nav-link" data-page="expenses"    href="expenses.html"><span class="nav-icon">📋</span> All Expenses</a>
      <a class="nav-link" data-page="report"      href="report.html"><span class="nav-icon">📊</span> Monthly Report</a>
      <div class="nav-label">Account</div>
      <a class="nav-link" data-page="profile"     href="profile.html"><span class="nav-icon">👤</span> Profile</a>
      <a class="nav-link" id="logoutBtn"><span class="nav-icon">🚪</span> Logout</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <div>
          <div class="user-chip-name"  id="sidebarUserName">User</div>
          <div class="user-chip-email" id="sidebarUserEmail">email</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Main Content ── -->
  <main class="main-content">
    <div class="page-header">
      <h1>👤 My Profile</h1>
      <div class="breadcrumb">Dashboard / Profile</div>
    </div>

    <div style="max-width:680px">

      <!-- Profile Card -->
      <div class="card" style="margin-bottom:24px">
        <!-- Avatar + display info -->
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;
                    padding-bottom:20px;border-bottom:1px solid var(--border)">
          <div id="profileAvatar" style="width:72px;height:72px;border-radius:50%;
               background:var(--primary);color:#fff;display:flex;align-items:center;
               justify-content:center;font-size:28px;font-weight:700;flex-shrink:0">U</div>
          <div>
            <div style="font-size:20px;font-weight:700" id="profileDisplayName">—</div>
            <div style="color:var(--text-muted);font-size:14px" id="profileDisplayEmail">—</div>
          </div>
        </div>

        <div class="card-title" style="margin-bottom:16px">Edit Profile</div>

        <div id="profileAlert" class="alert"></div>

        <form id="profileForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="profileName" placeholder="Your full name" required/>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="profileEmail" placeholder="you@example.com" required/>
          </div>
          <button type="submit" class="btn btn-primary" id="saveProfileBtn" style="width:auto;padding:12px 28px">
            💾 Save Changes
          </button>
        </form>
      </div>

      <!-- Change Password Card -->
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">🔒 Change Password</div>

        <div id="passwordAlert" class="alert"></div>

        <form id="passwordForm">
          <div class="form-group">
            <label>Current Password</label>
            <input type="password" id="currentPassword" placeholder="Enter current password" required/>
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Min 6 characters" required/>
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmNewPassword" placeholder="Repeat new password" required/>
          </div>
          <button type="submit" class="btn btn-secondary" id="changePasswordBtn" style="width:auto;padding:12px 28px">
            🔑 Change Password
          </button>
        </form>
      </div>

      <!-- Danger Zone -->
      <div class="card" style="border:2px solid #ffe4e4">
        <div class="card-title" style="margin-bottom:12px;color:var(--accent)">🚪 Logout</div>
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:16px">
          You will be signed out and redirected to the login page.
        </p>
        <button class="btn btn-danger" id="logoutBtn2" onclick="logout()" style="width:auto;padding:10px 24px">
          Logout Now
        </button>
      </div>

    </div>
  </main>
</div>

<script src="js/common.js"></script>
<script src="js/profile.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Smart Expense</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">💰</div>
      <div class="logo-text">SmartExpense</div>
    </div>

    <h2>Create Account</h2>
    <p class="subtitle">Start tracking your expenses and budget today</p>

    <div id="regAlert" class="alert"></div>

    <form id="registerForm" autocomplete="off">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Ravi Kumar" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" required />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" required />
      </div>

      <button type="submit" class="btn btn-primary" id="regBtn">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
